<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Cadastro</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <h1>CADASTRO FINALIZADO COM SUCESSO!</h1>

    <div class="resultado-container">
        <h2>Dados do Torcedor</h2>
        
        <div id="dados-torcedor"></div>

        <div class="classificacao">
            <h3>Classificação do Torcedor</h3>
            <p id="idade"></p>
            <p id="classificacao" class="classificacao-texto"></p>
        </div>
    </div>

    <form action="./index.html" method="GET">
        <button id="enviar" type="submit">Continuar</button>
    </form>

    <script>
        // Função melhorada para calcular idade
        function calcularIdade(dataNascimentoStr) {
            if (!dataNascimentoStr) return 0;

            const [ano, mes, dia] = dataNascimentoStr.split('-').map(Number);
            const hoje = new Date();

            let idade = hoje.getFullYear() - ano;

            // Verifica se já fez aniversário este ano
            if (hoje.getMonth() + 1 < mes || 
               (hoje.getMonth() + 1 === mes && hoje.getDate() < dia)) {
                idade--;
            }

            return idade;
        }

        function classificarTorcedor(idade) {
            if (idade <= 16) {
                return { texto: "Torcedor Mirim", cor: "#2196F3" };
            } else if (idade <= 30) {
                return { texto: "Torcedor Novato", cor: "#4CAF50" };
            } else {
                return { texto: "Torcedor Experiente", cor: "#FF5722" };
            }
        }

        // Obter parâmetros da URL
        const params = new URLSearchParams(window.location.search);

        const nome = params.get('nome') || 'Não informado';
        const dataNascimento = params.get('data_nascimento') || '';
        const email = params.get('email') || 'Não informado';
        const pais = params.get('pais') || 'Não informado';
        const jogadorFavorito = params.get('jogador_favorito') || 'Não informado';

        // Calcular idade e classificação
        let idade = 0;
        let classificacaoInfo = { texto: '', cor: '' };

        if (dataNascimento) {
            idade = calcularIdade(dataNascimento);
            classificacaoInfo = classificarTorcedor(idade);
        }

        // Exibir os dados do formulário
        const container = document.getElementById('dados-torcedor');
        container.innerHTML = `
            <div class="dado"><strong>Nome:</strong> ${nome}</div>
            <div class="dado"><strong>Data de Nascimento:</strong> ${dataNascimento || 'Não informado'}</div>
            <div class="dado"><strong>Email:</strong> ${email}</div>
            <div class="dado"><strong>País:</strong> ${pais}</div>
            <div class="dado"><strong>Jogador Favorito:</strong> ${jogadorFavorito}</div>
        `;

        // Exibir idade e classificação
        const idadeEl = document.getElementById('idade');
        const classEl = document.getElementById('classificacao');

        if (dataNascimento && idade >= 0) {
            idadeEl.innerHTML = `Idade: <span class="idade">${idade} anos</span>`;
            classEl.innerHTML = classificacaoInfo.texto;
            classEl.style.color = classificacaoInfo.cor;
        } else {
            idadeEl.innerHTML = "Idade: Não foi possível calcular";
            classEl.innerHTML = "Classificação indisponível";
        }
    </script>
</body>
</html>
